name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --noconsole --name DailyScheduler main.py

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Build Installer
        shell: powershell
        run: |
          $iscc = "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\\Program Files\\Inno Setup 6\\ISCC.exe"
          }
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found after installation"
          }
          & $iscc "installer\\daily_scheduler.iss"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyScheduler-exe
          path: dist/DailyScheduler.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyScheduler-setup
          path: installer/output/DailyScheduler-Setup-*.exe
          if-no-files-found: error
